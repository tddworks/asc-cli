<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASC Manager — App Store Connect</title>
<link rel="icon" type="image/png" sizes="32x32" href="../shared/static/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../shared/static/favicon-16x16.png">
<link rel="apple-touch-icon" href="../shared/static/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/utilities.css">
</head>

<body>
<div class="app">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="../shared/static/logo.png" alt="ASC" style="width:36px;height:36px;border-radius:var(--radius);flex-shrink:0">
      <div>
        <h1>ASC Manager</h1>
        <p>App Store Connect</p>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Overview</div>
        <button class="nav-item active" data-page="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </button>
        <button class="nav-item" data-page="apps" id="navAppsItem">
          <div id="navAppIcon" style="width:18px;height:18px;border-radius:4px;background:var(--text-muted);display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700;flex-shrink:0">?</div>
          <div style="min-width:0;flex:1">
            <div id="navAppName" style="font-size:13px;line-height:1.2">Apps</div>
            <div id="navAppBundle" style="font-size:10px;color:var(--text-muted);font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2"></div>
          </div>
        </button>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">Release</div>
        <button class="nav-item" data-page="versions">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
          Versions
        </button>
        <button class="nav-item" data-page="builds">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          Builds
          <span class="badge">3</span>
        </button>
        <button class="nav-item" data-page="testflight">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
          TestFlight
        </button>
        <button class="nav-item" data-page="submissions">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>
          Submissions
        </button>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">Metadata</div>
        <button class="nav-item" data-page="appinfo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
          App Info
        </button>
        <button class="nav-item" data-page="screenshots">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          Screenshots
        </button>
        <button class="nav-item" data-page="reviews">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Reviews
        </button>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">Monetization</div>
        <button class="nav-item" data-page="iap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          In-App Purchases
        </button>
        <button class="nav-item" data-page="subscriptions">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 6l-9.5 9.5-5-5L1 18"/><path d="M17 6h6v6"/></svg>
          Subscriptions
        </button>
        <button class="nav-item" data-page="reports">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>
          Reports
        </button>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">Private API</div>
        <button class="nav-item" data-page="iris">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          Iris
        </button>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">Infrastructure</div>
        <button class="nav-item" data-page="codesigning">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Code Signing
        </button>
        <button class="nav-item" data-page="xcodecloud">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9z"/></svg>
          Xcode Cloud
        </button>
        <button class="nav-item" data-page="users">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Users & Roles
        </button>
        <button class="nav-item" data-page="simulators">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
          Simulators
        </button>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="auth-status" id="authStatus">
        <div class="auth-dot" id="authDot"></div>
        <div class="auth-info" id="authInfo">
          <span>Checking...</span>
          asc auth check
        </div>
      </div>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <div class="main">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <button class="header-btn mobile-menu-btn" onclick="toggleSidebar()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <div class="header-title" id="pageTitle">Dashboard</div>
          <div class="header-breadcrumb" id="pageBreadcrumb">
            <span>ASC Manager</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
            <span>Dashboard</span>
          </div>
        </div>
      </div>
      <div class="header-right">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="Search commands..." id="searchInput" />
          <kbd>/</kbd>
        </div>
        <button class="header-btn" onclick="openCommandLog()" title="Command Log">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        </button>
        <button class="header-btn" id="modeToggle" title="Data source: Mock" style="position:relative">
          <svg id="modeIconMock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          <svg id="modeIconCLI" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          <span id="modeDot" style="position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:var(--warning);border:2px solid var(--bg-card)"></span>
        </button>
        <button class="theme-toggle" title="Toggle dark mode" onclick="toggleTheme()">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button class="header-btn" title="Refresh" onclick="refreshCurrentPage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
      </div>
    </header>

    <!-- Content -->
    <div class="content" id="content">
      <!-- Pages rendered by JS -->
    </div>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Command Log Modal -->
<div class="modal-overlay" id="cmdLogModal">
  <div class="modal" style="max-width:640px">
    <div class="modal-header">
      <h3>Command Log</h3>
      <button class="modal-close" onclick="closeModal('cmdLogModal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="cmd-log" id="cmdLogContent">
        <div><span class="cmd-prompt">$</span> Ready. Run commands from the UI to see logs here.</div>
      </div>
    </div>
  </div>
</div>

<!-- Create Version Modal -->
<div class="modal-overlay" id="createVersionModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Create New Version</h3>
      <button class="modal-close" onclick="closeModal('createVersionModal')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">App</label>
        <select class="form-input select-styled" id="cvApp"><option>Select app...</option></select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Version String</label>
          <input class="form-input" placeholder="e.g. 1.0.0" id="cvVersion"/>
        </div>
        <div class="form-group">
          <label class="form-label">Platform</label>
          <select class="form-input select-styled" id="cvPlatform">
            <option value="IOS">iOS</option>
            <option value="MAC_OS">macOS</option>
            <option value="TV_OS">tvOS</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('createVersionModal')">Cancel</button>
      <button class="btn btn-primary" onclick="createVersion()">Create Version</button>
    </div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
